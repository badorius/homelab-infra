apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gitea

resources:
  - namespace.yaml

helmCharts:
  - name: gitea
    repo: https://dl.gitea.com/charts/
    version: 10.1.4
    releaseName: gitea
    namespace: gitea
    apiVersions:
      - networking.k8s.io/v1/Ingress
      - networking.k8s.io/v1
    valuesInline:
      gitea:
        admin:
          existingSecret: "gitea-admin-secret"
        config:
          server:
            DOMAIN: gitea.home
            ROOT_URL: "https://gitea.home/"
      postgresql-ha:
        enabled: false
      postgresql:
        enabled: true
        global:
          storageClass: nfs-client
      redis-cluster:
        enabled: false
      redis:
        enabled: true
      ingress:
        enabled: true
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: homelab-ca
        hosts:
          - host: gitea.home
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - gitea.home
            secretName: gitea-tls
      persistence:
        enabled: true
        storageClass: nfs-client
        size: 10Gi
