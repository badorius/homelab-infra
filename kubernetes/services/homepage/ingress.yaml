---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage
  namespace: homepage
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: homelab-ca
spec:
  tls:
    - hosts:
        - homepage.home
      secretName: homepage-tls
  rules:
    - host: homepage.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homepage
                port:
                  number: 80
