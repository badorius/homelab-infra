---
- name: Authorize mgmt SSH key on all nodes
  hosts: arch:omv:vms
  become: true

  vars:
    mgmt_pubkey: "{{ lookup('file', '/home/darthv/.ssh/id_ed25519.pub') }}"

  tasks:

    - name: Ensure .ssh directory exists
      file:
        path: "/home/darthv/.ssh"
        state: directory
        owner: darthv
        group: darthv
        mode: "0700"

    - name: Add mgmt public key to authorized_keys
      authorized_key:
        user: darthv
        key: "{{ mgmt_pubkey }}"
        state: present
