---
- name: Update and Reboot Arch Hosts
  hosts: arch
  become: true
  tasks:
    - name: Update pacman cache and upgrade all packages
      pacman:
        update_cache: yes
        upgrade: yes
    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required
    - name: Reboot Arch hosts
      reboot:
        msg: "Rebooting after system update"

- name: Update and Reboot Ubuntu VMs
  hosts: vms
  become: true
  tasks:
    - name: Update apt cache and upgrade all packages
      apt:
        update_cache: yes
        upgrade: dist
    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required
    - name: Reboot Ubuntu VMs
      reboot:
        msg: "Rebooting after system update"
