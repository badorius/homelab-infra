---
- name: Bootstrap Management VM
  hosts: mgmt
  become: true

  vars:
    mgmt_user: darthv
    mgmt_home: "/home/{{ mgmt_user }}"
    repo_url: "git@github.com:badorius/homelab-infra.git"
    repo_dest: "/opt/homelab/homelab-infra"

  tasks:

    # -------------------------
    # Ensure /opt/homelab exists with correct ownership
    # -------------------------
    - name: Ensure /opt/homelab exists
      file:
        path: /opt/homelab
        state: directory
        owner: "{{ mgmt_user }}"
        group: "{{ mgmt_user }}"
        mode: "0755"

    # -------------------------
    # Clone repo as darthv
    # -------------------------
    - name: Clone homelab repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dest }}"
        version: main
        accept_hostkey: yes
        update: yes
      become_user: "{{ mgmt_user }}"
