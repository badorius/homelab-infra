---
- name: Install K3s on Master
  shell: curl -sfL https://get.k3s.io | sh -
  args:
    creates: /usr/local/bin/k3s
  when: "'k3s_master' in group_names"

- name: Wait for node-token to be generated
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
  when: "'k3s_master' in group_names"

- name: Extract node-token from master
  command: cat /var/lib/rancher/k3s/server/node-token
  register: k3s_token
  when: "'k3s_master' in group_names"
  changed_when: false

- name: Set token as fact for all hosts
  set_fact:
    k3s_master_token: "{{ hostvars[groups['k3s_master'][0]]['k3s_token']['stdout'] | trim }}"
  when: groups['k3s_master'] is defined

- name: Install K3s on Workers
  shell: "curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars[groups['k3s_master'][0]]['ansible_host'] }}:6443 K3S_TOKEN={{ k3s_master_token }} sh -"
  args:
    creates: /usr/local/bin/k3s
  when: "'k3s_worker' in group_names"

- name: Fetch kubeconfig from Master
  fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ lookup('env', 'PWD') }}/k3s.yaml"
    flat: yes
  when: "'k3s_master' in group_names"

- name: Update IP in locally fetched kubeconfig
  delegate_to: localhost
  become: false
  replace:
    path: "{{ lookup('env', 'PWD') }}/k3s.yaml"
    regexp: '127\.0\.0\.1'
    replace: "{{ hostvars[groups['k3s_master'][0]]['ansible_host'] }}"
  when: "'k3s_master' in group_names"
