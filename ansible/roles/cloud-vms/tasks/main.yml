---
# -------------------------
# Directories
# -------------------------
- name: Ensure directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /var/lib/libvirt/images
    - /var/lib/libvirt/seed
    - /var/lib/libvirt/base

# -------------------------
# Download base image
# -------------------------
- name: Download Ubuntu Cloud Image
  get_url:
    url: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
    dest: /var/lib/libvirt/base/ubuntu.img
    mode: '0644'

# -------------------------
# Create disks
# -------------------------
- name: Create disks
  command: >
    qemu-img create -f qcow2 -F qcow2
    -b /var/lib/libvirt/base/ubuntu.img
    /var/lib/libvirt/images/{{ vm.name }}.qcow2 20G
  args:
    creates: "/var/lib/libvirt/images/{{ vm.name }}.qcow2"
  loop: "{{ vm_list }}"
  loop_control:
    loop_var: vm
  when: vm.target_host == inventory_hostname

# -------------------------
# Seed dirs
# -------------------------
- name: Create seed dirs
  file:
    path: "/var/lib/libvirt/seed/{{ vm.name }}"
    state: directory
  loop: "{{ vm_list }}"
  loop_control:
    loop_var: vm
  when: vm.target_host == inventory_hostname

# -------------------------
# cloud-init user-data
# -------------------------
- name: Render cloud-init user-data
  template:
    src: user-data.j2
    dest: "/var/lib/libvirt/seed/{{ vm.name }}/user-data"
  loop: "{{ vm_list }}"
  loop_control:
    loop_var: vm
  when: vm.target_host == inventory_hostname

# -------------------------
# cloud-init meta-data
# -------------------------
- name: Render cloud-init meta-data
  template:
    src: meta-data.j2
    dest: "/var/lib/libvirt/seed/{{ vm.name }}/meta-data"
  loop: "{{ vm_list }}"
  loop_control:
    loop_var: vm
  when: vm.target_host == inventory_hostname

# -------------------------
# Create ISO
# -------------------------
- name: Create cloud-init ISO
  command: >
    cloud-localds
    /var/lib/libvirt/seed/{{ vm.name }}.iso
    /var/lib/libvirt/seed/{{ vm.name }}/user-data
    /var/lib/libvirt/seed/{{ vm.name }}/meta-data
  args:
    creates: "/var/lib/libvirt/seed/{{ vm.name }}.iso"
  loop: "{{ vm_list }}"
  loop_control:
    loop_var: vm
  when: vm.target_host == inventory_hostname

# -------------------------
# Render XML
# -------------------------
- name: Render VM XML
  template:
    src: vm.xml.j2
    dest: "/tmp/{{ vm.name }}.xml"
  loop: "{{ vm_list }}"
  loop_control:
    loop_var: vm
  when: vm.target_host == inventory_hostname

# -------------------------
# Define VM
# -------------------------
- name: Define VM
  command: virsh define /tmp/{{ vm.name }}.xml
  loop: "{{ vm_list }}"
  loop_control:
    loop_var: vm
  when: vm.target_host == inventory_hostname
  ignore_errors: true

# -------------------------
# Autostart VM
# -------------------------
- name: Enable VM autostart
  command: virsh autostart {{ vm.name }}
  loop: "{{ vm_list }}"
  loop_control:
    loop_var: vm
  when: vm.target_host == inventory_hostname
  ignore_errors: true

# -------------------------
# Start VM
# -------------------------
- name: Start VM
  command: virsh start {{ vm.name }}
  loop: "{{ vm_list }}"
  loop_control:
    loop_var: vm
  when: vm.target_host == inventory_hostname
  ignore_errors: true

